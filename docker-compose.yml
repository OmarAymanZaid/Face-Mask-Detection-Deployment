services:
  mask-detection-api:
    build: .
    image: face-mask-image
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/best_model_NO_AUG.pth
  streamlit:
    image: face-mask-image
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
    - API_URL=http://mask-detection-api:8000/predict